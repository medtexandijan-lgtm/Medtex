{% extends 'base.html' %}

{% block title %}Ombor operatsiyasi - Medical CRM{% endblock %}

{% block content %}
<div class="top-bar">
    <h1 class="page-title">Ombor operatsiyasi</h1>
</div>

<div class="page-content">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Mahsulot</label>
                <select name="product" class="form-control" required>
                    <option value="">-- Mahsulotni tanlang --</option>
                    {% for product in products %}
                    <option value="{{ product.id }}">{{ product.name }} ({{ product.stock }} {{ product.unit }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Amal turi</label>
                <select name="transaction_type" class="form-control" required>
                    <option value="in">Kirim</option>
                    <option value="out">Chiqim</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Soni</label>
                <input type="number" name="quantity" class="form-control" min="1" required>
            </div>
            <div class="form-group">
                <label class="form-label">Izoh</label>
                <textarea name="notes" class="form-control" rows="2" placeholder="Izoh (ixtiyoriy)"></textarea>
            </div>
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button type="submit" class="btn btn-primary">Saqlash</button>
                <a href="{% url 'warehouse' %}" class="btn btn-secondary">Bekor qilish</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
